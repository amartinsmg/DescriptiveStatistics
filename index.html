<!doctype html><html lang="en" data-bs-theme="dark"><head><meta charset="UTF-8"/><meta http-equiv="X-UA-Compatible" content="IE=edge"/><meta name="viewport" content="width=device-width,initial-scale=1"/><title>Descriptive Statistics</title><link rel="shortcut icon" href="assets/9bc4c69246766adcb645.ico" type="image/x-icon"/><link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.8/css/bootstrap.min.css"/><script defer="defer" src="assets/bundle.js"></script><link href="assets/bundle.css" rel="stylesheet"></head><body><header class="text-center"><h1>Descriptive Statistics Calculator</h1></header><main><form action="" id="input-form" class="d-flex flex-column gap-3 pt-3 pb-4"><div class="text-start form-group d-flex flex-column gap-1"><label for="dataset-input">Dataset:</label> <textarea class="form-control" name="dataset" id="dataset-input" placeholder="Enter the numbers separeted by comma" inputmode="decimal" rows="5"></textarea></div><div class="form-group d-flex flex-row gap-3 justify-content-center"><input type="radio" checked="checked" name="sample-pop" id="sample-pop-pop" value="population"/> <label for="sample-pop-pop">Population</label> <input type="radio" name="sample-pop" id="sample-pop-sample" value="sample"/> <label for="sample-pop-sample">Sample</label></div><div class="form-group d-flex flex-row gap-3 justify-content-center pt-2"><button class="btn btn-secondary" type="reset">Reset</button> <button class="btn btn-primary" type="submit">Calculate</button></div></form><div class="text-center pb-5" id="err-feedback"></div><output id="out" class="d-flex flex-column gap-3 pb-5"><div class="out-group d-flex flex-column"><div class="out-label text-center w-100">Sorted data set</div><div class="out-value text-center w-100" id="sorted-dataset"></div></div><div class="out-group"><div class="out-label">Cout</div><div class="out-value" id="cout"></div></div><div class="out-group"><div class="out-label">Min</div><div class="out-value" id="min"></div></div><div class="out-group"><div class="out-label">Max</div><div class="out-value" id="max"></div></div><div class="out-group"><div class="out-label">Range</div><div class="out-value" id="range"></div></div><div class="out-group"><div class="out-label">Midrange</div><div class="out-value" id="midrange"></div></div><div class="out-group"><div class="out-label">Arithmetic Mean</div><div class="out-value" id="arithmetic-mean"></div></div><div class="out-group"><div class="out-label">Median</div><div class="out-value" id="median"></div></div><div class="out-group"><div class="out-label">Mode</div><div class="out-value" id="mode"></div></div><div class="out-group"><div class="out-label">Arithmetic Standard Deviation</div><div class="out-value" id="standard-deviation"></div></div><div class="out-group d-flex flex-row gap-3"><div class="out-label">Arithmetic Variance</div><div class="out-value" id="variance"></div></div><div class="out-group d-flex flex-row gap-3 justify-content-center"><div class="out-label">Geometric Mean</div><div class="out-value" id="geometric-mean"></div></div><div class="out-group d-flex flex-row gap-3 justify-content-center"><div class="out-label">Harmonic Mean</div><div class="out-value" id="harmonic-mean"></div></div></output></main><footer class="pt-4"><p class="w-100 text-center"><small>Visit this project's <a href="https://github.com/amartinsmg/DescriptiveStatistics">repository</a>.<br/>Made by <a href="https://amartinsmg.github.io">amartinsmg</a>. <a href="https://www.flaticon.com/free-icons/profit" title="profit icons">Profit icons created by Pixel perfect - Flaticon</a>.</small></p></footer></body></html>
